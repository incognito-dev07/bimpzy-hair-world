<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="100%" height="auto">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5e6a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="smoke1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#d4af37;stop-opacity:0.06" />
      <stop offset="50%" style="stop-color:#f5e6a3;stop-opacity:0.1" />
      <stop offset="70%" style="stop-color:#d4af37;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
    </linearGradient>
    
    <linearGradient id="smoke2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5e6a3;stop-opacity:0" />
      <stop offset="25%" style="stop-color:#f5e6a3;stop-opacity:0.08" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:0.12" />
      <stop offset="75%" style="stop-color:#f5e6a3;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#f5e6a3;stop-opacity:0" />
    </linearGradient>
    
    <linearGradient id="smoke3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0" />
      <stop offset="35%" style="stop-color:#d4af37;stop-opacity:0.05" />
      <stop offset="50%" style="stop-color:#f5e6a3;stop-opacity:0.08" />
      <stop offset="65%" style="stop-color:#d4af37;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="900" height="420" fill="transparent"/>

  <!-- Smoke/Aurora waves - scaled Y coordinates -->
  <g>
    <path d="M-100,180 Q0,135 100,165 Q200,195 300,150 Q400,105 500,157 Q600,210 700,150 Q800,90 900,165 Q1000,225 1100,180 L1100,300 L-100,300 Z" fill="url(#smoke1)">
      <animate attributeName="d" 
        values="M-100,180 Q0,135 100,165 Q200,195 300,150 Q400,105 500,157 Q600,210 700,150 Q800,90 900,165 Q1000,225 1100,180 L1100,300 L-100,300 Z;
                M-100,172 Q0,150 100,180 Q200,210 300,165 Q400,120 500,172 Q600,217 700,165 Q800,105 900,180 Q1000,210 1100,195 L1100,300 L-100,300 Z;
                M-100,187 Q0,120 100,150 Q200,180 300,135 Q400,90 500,142 Q600,195 700,135 Q800,75 900,150 Q1000,240 1100,165 L1100,300 L-100,300 Z;
                M-100,180 Q0,135 100,165 Q200,195 300,150 Q400,105 500,157 Q600,210 700,150 Q800,90 900,165 Q1000,225 1100,180 L1100,300 L-100,300 Z" 
        dur="8s" repeatCount="indefinite"/>
    </path>

    <path d="M-100,210 Q0,165 100,195 Q200,225 300,180 Q400,135 500,187 Q600,240 700,180 Q800,120 900,195 Q1000,255 1100,210 L1100,300 L-100,300 Z" fill="url(#smoke2)">
      <animate attributeName="d" 
        values="M-100,210 Q0,165 100,195 Q200,225 300,180 Q400,135 500,187 Q600,240 700,180 Q800,120 900,195 Q1000,255 1100,210 L1100,300 L-100,300 Z;
                M-100,202 Q0,180 100,210 Q200,240 300,195 Q400,150 500,202 Q600,247 700,195 Q800,135 900,210 Q1000,240 1100,225 L1100,300 L-100,300 Z;
                M-100,217 Q0,150 100,180 Q200,210 300,165 Q400,120 500,172 Q600,225 700,165 Q800,105 900,180 Q1000,270 1100,195 L1100,300 L-100,300 Z;
                M-100,210 Q0,165 100,195 Q200,225 300,180 Q400,135 500,187 Q600,240 700,180 Q800,120 900,195 Q1000,255 1100,210 L1100,300 L-100,300 Z" 
        dur="10s" repeatCount="indefinite" begin="1s"/>
    </path>

    <path d="M-100,240 Q0,195 100,225 Q200,255 300,210 Q400,165 500,217 Q600,270 700,210 Q800,150 900,225 Q1000,285 1100,240 L1100,300 L-100,300 Z" fill="url(#smoke3)">
      <animate attributeName="d" 
        values="M-100,240 Q0,195 100,225 Q200,255 300,210 Q400,165 500,217 Q600,270 700,210 Q800,150 900,225 Q1000,285 1100,240 L1100,300 L-100,300 Z;
                M-100,232 Q0,210 100,240 Q200,270 300,225 Q400,180 500,232 Q600,277 700,225 Q800,165 900,240 Q1000,270 1100,255 L1100,300 L-100,300 Z;
                M-100,247 Q0,180 100,210 Q200,240 300,195 Q400,150 500,202 Q600,255 700,195 Q800,135 900,210 Q1000,300 1100,225 L1100,300 L-100,300 Z;
                M-100,240 Q0,195 100,225 Q200,255 300,210 Q400,165 500,217 Q600,270 700,210 Q800,150 900,225 Q1000,285 1100,240 L1100,300 L-100,300 Z" 
        dur="12s" repeatCount="indefinite" begin="2s"/>
    </path>
  </g>

  <!-- Sparkle trails - adjusted Y coordinates -->
  <g>
    <circle r="3" fill="#d4af37" opacity="0.7">
      <animate attributeName="cx" values="-50;950;-50" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;157;150" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <circle r="2.5" fill="#f5e6a3" opacity="0.6">
      <animate attributeName="cx" values="-50;950;-50" dur="7s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="cy" values="187;195;187" dur="7s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="7s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    
    <circle r="2" fill="#d4af37" opacity="0.6">
      <animate attributeName="cx" values="-50;950;-50" dur="5s" repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="cy" values="127;135;127" dur="5s" repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="5s" repeatCount="indefinite" begin="2.5s"/>
    </circle>
    
    <circle r="3.5" fill="#f5e6a3" opacity="0.7">
      <animate attributeName="cx" values="-50;950;-50" dur="8s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="cy" values="217;225;217" dur="8s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="8s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    
    <circle r="1.8" fill="#d4af37" opacity="0.5">
      <animate attributeName="cx" values="-50;950;-50" dur="4.5s" repeatCount="indefinite" begin="4s"/>
      <animate attributeName="cy" values="172;180;172" dur="4.5s" repeatCount="indefinite" begin="4s"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="4.5s" repeatCount="indefinite" begin="4s"/>
    </circle>
    
    <circle r="2.2" fill="#f5e6a3" opacity="0.6">
      <animate attributeName="cx" values="-50;950;-50" dur="9s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="cy" values="112;120;112" dur="9s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="9s" repeatCount="indefinite" begin="3s"/>
    </circle>
    
    <circle r="2.5" fill="#d4af37" opacity="0.6">
      <animate attributeName="cx" values="-50;950;-50" dur="6.5s" repeatCount="indefinite" begin="5s"/>
      <animate attributeName="cy" values="202;210;202" dur="6.5s" repeatCount="indefinite" begin="5s"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="6.5s" repeatCount="indefinite" begin="5s"/>
    </circle>
    
    <circle r="1.5" fill="#f5e6a3" opacity="0.5">
      <animate attributeName="cx" values="-50;950;-50" dur="5.5s" repeatCount="indefinite" begin="6s"/>
      <animate attributeName="cy" values="232;240;232" dur="5.5s" repeatCount="indefinite" begin="6s"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="5.5s" repeatCount="indefinite" begin="6s"/>
    </circle>
  </g>

  <!-- Glitter particles -->
  <g>
    <polygon points="0,0 1.5,-3 3,0 1.5,3" fill="#d4af37" opacity="0.5">
      <animate attributeName="cx" values="-30;930;-30" dur="11s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="cy" values="157;165;157" dur="11s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="11s" repeatCount="indefinite" begin="0s"/>
    </polygon>
    
    <polygon points="0,0 1.5,-3 3,0 1.5,3" fill="#f5e6a3" opacity="0.5">
      <animate attributeName="cx" values="-30;930;-30" dur="10s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="cy" values="195;202;195" dur="10s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="10s" repeatCount="indefinite" begin="2s"/>
    </polygon>
    
    <polygon points="0,0 1.5,-3 3,0 1.5,3" fill="#d4af37" opacity="0.4">
      <animate attributeName="cx" values="-30;930;-30" dur="8.5s" repeatCount="indefinite" begin="4.5s"/>
      <animate attributeName="cy" values="135;142;135" dur="8.5s" repeatCount="indefinite" begin="4.5s"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="8.5s" repeatCount="indefinite" begin="4.5s"/>
    </polygon>
    
    <polygon points="0,0 1.5,-3 3,0 1.5,3" fill="#f5e6a3" opacity="0.4">
      <animate attributeName="cx" values="-30;930;-30" dur="12s" repeatCount="indefinite" begin="7s"/>
      <animate attributeName="cy" values="217;225;217" dur="12s" repeatCount="indefinite" begin="7s"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="12s" repeatCount="indefinite" begin="7s"/>
    </polygon>
  </g>

  <!-- Wavy Curly Lines - adjusted Y coordinates -->
  <g fill="none" stroke-width="2.5" stroke-linecap="round">
    <path d="M30,105 C120,67 200,142 300,97 C400,52 500,127 600,82 C700,37 800,112 870,90" stroke="url(#goldGrad)" opacity="0.2">
      <animate attributeName="d" 
        values="M30,105 C120,67 200,142 300,97 C400,52 500,127 600,82 C700,37 800,112 870,90;
                M30,97 C120,82 200,127 300,105 C400,67 500,120 600,90 C700,52 800,105 870,97;
                M30,105 C120,67 200,142 300,97 C400,52 500,127 600,82 C700,37 800,112 870,90" 
        dur="5s" repeatCount="indefinite"/>
    </path>
    
    <path d="M20,142 C110,105 190,172 290,127 C390,82 490,150 590,112 C690,75 790,142 880,120" stroke="url(#goldGrad)" stroke-width="2" opacity="0.15">
      <animate attributeName="d" 
        values="M20,142 C110,105 190,172 290,127 C390,82 490,150 590,112 C690,75 790,142 880,120;
                M20,135 C110,120 190,157 290,142 C390,97 490,142 590,120 C690,90 790,135 880,127;
                M20,142 C110,105 190,172 290,127 C390,82 490,150 590,112 C690,75 790,142 880,120" 
        dur="6s" repeatCount="indefinite"/>
    </path>

    <path d="M40,232 C130,195 210,262 310,217 C410,172 510,240 610,202 C710,165 810,232 860,217" stroke="url(#goldGrad)" stroke-width="2" opacity="0.18">
      <animate attributeName="d" 
        values="M40,232 C130,195 210,262 310,217 C410,172 510,240 610,202 C710,165 810,232 860,217;
                M40,225 C130,210 210,247 310,232 C410,187 510,232 610,210 C710,180 810,225 860,225;
                M40,232 C130,195 210,262 310,217 C410,172 510,240 610,202 C710,165 810,232 860,217" 
        dur="5.5s" repeatCount="indefinite"/>
    </path>

    <path d="M10,262 C100,232 180,285 280,247 C380,210 480,277 580,240 C680,202 780,262 890,247" stroke="url(#goldGrad)" stroke-width="1.8" opacity="0.12">
      <animate attributeName="d" 
        values="M10,262 C100,232 180,285 280,247 C380,210 480,277 580,240 C680,202 780,262 890,247;
                M10,255 C100,247 180,270 280,262 C380,225 480,270 580,247 C680,217 780,255 890,255;
                M10,262 C100,232 180,285 280,247 C380,210 480,277 580,240 C680,202 780,262 890,247" 
        dur="7s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Glittering dust particles - adjusted Y -->
  <g>
    <circle cx="120" cy="142" r="1.5" fill="#d4af37" opacity="0.4">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="120" r="1" fill="#f5e6a3" opacity="0.35">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="550" cy="135" r="1.5" fill="#d4af37" opacity="0.4">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="1.8s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="750" cy="112" r="1" fill="#f5e6a3" opacity="0.35">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="200" cy="255" r="1.2" fill="#d4af37" opacity="0.35">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="1.6s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="650" cy="247" r="1.2" fill="#f5e6a3" opacity="0.35">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="450" cy="277" r="1" fill="#d4af37" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="1.9s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="80" cy="217" r="1.2" fill="#f5e6a3" opacity="0.35">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.1s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="820" cy="232" r="1" fill="#d4af37" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="1.7s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
  </g>

  <!-- Main Brand Name - larger font -->
  <text x="450" y="185" font-family="Georgia, 'Times New Roman', serif" font-size="110" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="16">
    BIMPZY
    <animate attributeName="opacity" values="0.95;1;0.95" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle - larger font -->
  <text x="450" y="245" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#a0a0a0" text-anchor="middle" letter-spacing="24" font-weight="500">
    HAIR WORLD
  </text>

  <!-- Decorative line - adjusted Y -->
  <line x1="220" y1="275" x2="680" y2="275" stroke="url(#goldGrad)" stroke-width="1" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.4;0.25" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Decorative dots - adjusted Y -->
  <circle cx="208" cy="275" r="2" fill="#d4af37" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="692" cy="275" r="2" fill="#d4af37" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- Twinkling Stars - adjusted Y -->
  <g>
    <polygon points="130,60 132,51 134,60 140,63 134,66 132,75 130,66 124,63" fill="#d4af37" opacity="0.5">
      <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="770,67 772,58 774,67 780,70 774,73 772,82 770,73 764,70" fill="#d4af37" opacity="0.45">
      <animate attributeName="opacity" values="0;0.45;0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
    </polygon>
    <polygon points="330,37 332,28 334,37 340,40 334,43 332,52 330,43 324,40" fill="#d4af37" opacity="0.4">
      <animate attributeName="opacity" values="0;0.4;0" dur="1.8s" repeatCount="indefinite" begin="1.2s"/>
    </polygon>
    <polygon points="580,45 582,36 584,45 590,48 584,51 582,60 580,51 574,48" fill="#d4af37" opacity="0.35">
      <animate attributeName="opacity" values="0;0.35;0" dur="3s" repeatCount="indefinite" begin="0.3s"/>
    </polygon>
    <polygon points="85,142 87,133 89,142 95,145 89,148 87,157 85,148 79,145" fill="#d4af37" opacity="0.4">
      <animate attributeName="opacity" values="0;0.4;0" dur="2.2s" repeatCount="indefinite" begin="1.5s"/>
    </polygon>
    <polygon points="815,150 817,141 819,150 825,153 819,156 817,165 815,156 809,153" fill="#d4af37" opacity="0.35">
      <animate attributeName="opacity" values="0;0.35;0" dur="2.8s" repeatCount="indefinite" begin="0.6s"/>
    </polygon>
  </g>

  <!-- Floating diamonds - adjusted Y -->
  <g opacity="0.3">
    <polygon points="180,172 182,166 184,172 182,178" fill="#d4af37">
      <animate attributeName="opacity" values="0.3;0;0.3" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="3.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="720,165 722,159 724,165 722,171" fill="#d4af37">
      <animate attributeName="opacity" values="0.3;0;0.3" dur="4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="4s" repeatCount="indefinite" begin="1s"/>
    </polygon>
  </g>
</svg>